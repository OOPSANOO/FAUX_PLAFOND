<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BY OOPSANOO - FAUX PLAFOND DEMONTABLE</title>
    <style>
        :root { --dark-blue: #34495e; --light-bg: #f8f9fa; --border-color: #dee2e6; --accent: #e67e22; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #eaeff2; margin: 0; padding: 20px; }
        
        .container { max-width: 950px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); position: relative; }
        
        header { text-align: center; border-bottom: 2px solid var(--dark-blue); margin-bottom: 30px; padding-bottom: 10px; }
        header h1 { margin: 0; color: var(--dark-blue); font-size: 32px; letter-spacing: 2px; }
        header p { margin: 5px 0; color: #2c3e50; font-size: 20px; font-weight: bold; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 15px; }
        .buttons-group { display: flex; gap: 8px; flex-wrap: wrap; }
        
        .btn { border: none; border-radius: 6px; color: white; padding: 10px 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; transition: 0.3s; }
        .btn-word { background-color: #3c5a99; }
        .btn-pdf { background-color: #e74c3c; }
        .btn-print { background-color: #5cb85c; }
        .btn-save { background-color: #f0ad4e; }
        .btn-share-html { background-color: var(--accent); } /* زر المشاركة الجديد */

        .btn:hover { opacity: 0.85; transform: translateY(-1px); }

        .inputs-wrapper { display: flex; gap: 20px; align-items: center; }
        .area-input-wrapper { display: flex; align-items: center; gap: 10px; }
        .area-input-wrapper input { padding: 8px; border: 1px solid var(--border-color); border-radius: 6px; width: 100px; text-align: center; font-size: 16px; font-weight: bold; color: var(--dark-blue); }

        .avg-price-box { background: #f1f4f7; padding: 8px 15px; border-radius: 6px; border: 1px solid #d1d9e1; color: #2c3e50; font-weight: bold; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; border: 1px solid var(--border-color); }
        th { background-color: var(--dark-blue); color: white; padding: 15px; font-size: 15px; }
        td { padding: 12px; border-bottom: 1px solid var(--border-color); text-align: center; color: #2c3e50; font-size: 14px; }
        tr:nth-child(even) { background-color: #fcfcfc; }

        .price-input { width: 85px; padding: 6px; border: 2px solid #3498db; border-radius: 6px; text-align: center; font-weight: bold; font-size: 14px; }

        .footer-total { margin-top: 30px; background-color: var(--dark-blue); color: white; padding: 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .total-amount { font-size: 24px; font-weight: bold; }
        .trademark { font-size: 12px; color: #bdc3c7; }

        @media print {
            @page { size: A5 landscape; margin: 10mm; }
            .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; border: none; width: 100%; }
            .price-input { border: none !important; appearance: none; }
        }
    </style>
</head>
<body>

<div class="container" id="mainApp">
    <header>
        <h1>BY OOPSANOO</h1>
        <p>FAUX PLAFOND DEMONTABLE</p>
    </header>

    <div class="top-bar no-print">
        <div class="buttons-group">
            <button class="btn btn-word" onclick="exportToDoc()">Word 📝</button>
            <button class="btn btn-pdf" onclick="window.print()">PDF 📄</button>
            <button class="btn btn-print" onclick="window.print()">طباعة 🖨️</button>
            <button class="btn btn-save" onclick="savePrices()">حفظ الأسعار 💾</button>
            <button class="btn btn-share-html" onclick="downloadModifiedHTML()">مشاركة الملف (HTML) 🔗</button>
        </div>
        <div class="inputs-wrapper">
            <div class="avg-price-box">
                متوسط السعر: <span id="avgPriceDisplay">0</span> دج/م²
            </div>
            <div class="area-input-wrapper">
                <span>المساحة (m²):</span>
                <input type="number" id="areaInput" value="100" oninput="calculate()">
            </div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>المادة</th>
                <th>الوحدة</th>
                <th>سعر الوحدة (دج)</th>
                <th>الكمية (صحيح)</th>
                <th>الإجمالي (دج)</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="footer-total">
        <div class="total-amount" id="grandTotal">الإجمالي: 0 دج</div>
        <div class="trademark">BY OOPSANOO - العلامة المسجلة</div>
    </div>
</div>

<script>
    const itemsData = [
        { name: "FAUX PLAFOND", unit: "M²", coeff: 1, defaultPrice: 495 },
        { name: "PORTEUR 3,60", unit: "U", coeff: 0.25, defaultPrice: 400 },
        { name: "ENTRETOISE 1,20", unit: "U", coeff: 1.5, defaultPrice: 180 },
        { name: "ENTRETOISE 0,60", unit: "U", coeff: 1.5, defaultPrice: 90 },
        { name: "CORNIERE LAQUE BLANC", unit: "U", coeff: 0.2, defaultPrice: 120 },
        { name: "CHEVILLE A FRAPPE 6*38", unit: "U", coeff: 2.8, defaultPrice: 4 },
        { name: "TIGE LISSE 30", unit: "U", coeff: 1.5, defaultPrice: 10 },
        { name: "RESSORT ZINGUE", unit: "U", coeff: 0.75, defaultPrice: 20 },
        { name: "cheviLLE", unit: "U", coeff: 0.75, defaultPrice: 20 }
    ];

    function calculate() {
        const areaInput = document.getElementById('areaInput');
        const area = parseFloat(areaInput.value) || 0;
        const tbody = document.getElementById('tableBody');
        let total = 0;
        const savedPrices = JSON.parse(localStorage.getItem('oopsanoo_custom_prices')) || {};

        if (tbody.innerHTML === "") {
            itemsData.forEach((item, i) => {
                let currentPrice = savedPrices[i] !== undefined ? savedPrices[i] : item.defaultPrice;
                tbody.innerHTML += `
                    <tr>
                        <td style="text-align: right; padding-right: 20px;">${item.name}</td>
                        <td>${item.unit}</td>
                        <td><input type="number" class="price-input" id="p-${i}" value="${currentPrice}" oninput="calculate()"></td>
                        <td id="q-${i}" style="font-weight:bold; color:#27ae60">0</td>
                        <td id="t-${i}" style="text-align: left; padding-left: 20px;">0 دج</td>
                    </tr>`;
            });
        }

        for (let i = 0; i < itemsData.length; i++) {
            const price = parseFloat(document.getElementById(`p-${i}`).value) || 0;
            const quantity = Math.ceil(itemsData[i].coeff * area);
            const subtotal = quantity * price;
            
            document.getElementById(`q-${i}`).innerText = quantity;
            document.getElementById(`t-${i}`).innerText = subtotal.toLocaleString('fr-FR') + " دج";
            total += subtotal;
        }

        document.getElementById('grandTotal').innerText = "الإجمالي: " + total.toLocaleString('fr-FR') + " دج";
        const avgPrice = area > 0 ? (total / area) : 0;
        document.getElementById('avgPriceDisplay').innerText = Math.round(avgPrice).toLocaleString('fr-FR');
    }

    function savePrices() {
        const prices = {};
        for (let i = 0; i < itemsData.length; i++) {
            prices[i] = document.getElementById(`p-${i}`).value;
        }
        localStorage.setItem('oopsanoo_custom_prices', JSON.stringify(prices));
        alert('✅ تم حفظ تعديلات الأسعار في متصفحك!');
    }

    function downloadModifiedHTML() {
        // تحديث قيم الـ Inputs داخل كود الصفحة قبل التحميل لتصبح ثابتة
        for (let i = 0; i < itemsData.length; i++) {
            const val = document.getElementById(`p-${i}`).value;
            document.getElementById(`p-${i}`).setAttribute('value', val);
        }
        
        const fullContent = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
        const blob = new Blob([fullContent], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'BY_OOPSANOO_Demontable_Updated.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        alert('📦 تم تجهيز الملف المحدث! يمكنك الآن إرساله لمن تشاء.');
    }

    function exportToDoc() {
        let content = document.getElementById('mainApp').innerHTML;
        let blob = new Blob(['\ufeff', content], { type: 'application/msword' });
        let url = URL.createObjectURL(blob);
        let link = document.createElement('a');
        link.href = url;
        link.download = 'BY_OOPSANOO_Report.doc';
        link.click();
    }

    calculate();
</script>

</body>
</html>
